<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Baby ❤️</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;

            background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7') no-repeat center center/cover;
            position: relative;
        }

        /* Soft overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            color: white;
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: clamp(20px, 5vw, 32px);
            line-height: 1.4;
            margin-bottom: 25px;
            animation: fadeIn 1.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        button {
            padding: 14px 28px;
            font-size: clamp(16px, 4vw, 18px);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.25s;
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
        }

        #yesBtn:active {
            transform: scale(1.1);
        }

        #noBtn {
            background: #555;
            color: white;
            position: fixed;
        }

        #surprise {
            display: none;
            margin-top: 25px;
            animation: pop 0.5s ease forwards;
        }

        @keyframes pop {
            from {transform: scale(0);}
            to {transform: scale(1);}
        }

        img {
            width: 80%;
            max-width: 250px;
            border-radius: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>
        Baby please meet me tomorrow 🥺<br>
        I have a surprise for you 💖
    </h1>

    <button id="yesBtn">Yes 😘</button>
    <button id="noBtn">No 😏</button>

    <div id="surprise">
        <h2>Yayyyy! Thank you baby 😍💞</h2>
        <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const surprise = document.getElementById("surprise");

    function moveButton() {
        const buttonWidth = noBtn.offsetWidth;
        const buttonHeight = noBtn.offsetHeight;

        const maxX = window.innerWidth - buttonWidth - 10;
        const maxY = window.innerHeight - buttonHeight - 10;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    // Desktop
    noBtn.addEventListener("mouseover", moveButton);

    // Mobile
    noBtn.addEventListener("touchstart", function(e) {
        e.preventDefault();
        moveButton();
    });

    yesBtn.addEventListener("click", function() {
        surprise.style.display = "block";
    });
</script>

</body>
</html>
